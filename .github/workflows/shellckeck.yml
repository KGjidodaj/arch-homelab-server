name: Bash Script CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  arch_shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
